name: Feature Request
description: Propose a new feature or improvement for Batten
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Propose a change to the Batten template. Consider which tier this falls under.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: "Projects generated by Batten currently lack ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution. What files/templates would change?
      placeholder: |
        Add a new template file `.github/workflows/deploy.yml.jinja` that ...
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Tier Classification
      description: How complex is this change?
      options:
        - "S -- Schema/Security/Infra (new copier questions, major template restructure)"
        - "A -- Feature (new template file, new workflow)"
        - "B -- Enhancement (modify existing template/workflow)"
        - "C -- Trivial (docs, comments, minor fixes)"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change?
      description: Would this change break existing projects that use Batten?
      options:
        - "No -- backward compatible"
        - "Yes -- existing projects need to update"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information, mockups, or examples.
    validations:
      required: false
