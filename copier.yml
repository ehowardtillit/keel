# Batten -- Copier Template Configuration
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: ""
_templates_suffix: .jinja

_tasks:
  - "chmod +x bootstrap.sh"
  - "chmod +x batten"

_exclude:
  - "copier.yml"
  - ".git"
  - ".github/workflows/batten-ci.yml"
  - ".github/ISSUE_TEMPLATE/bug.yml"
  - ".github/ISSUE_TEMPLATE/feature.yml"
  - ".github/ISSUE_TEMPLATE/config.yml"
  - "LICENSE-FAQ.md"
  - "install.sh"
  - "CHANGELOG.md"

# ─── Project Basics ───────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Project name (e.g., 'My API', 'Acme CRM')"
  default: "My Project"

github_owner:
  type: str
  help: "GitHub username or org (for CODEOWNERS)"
  default: "CHANGE-ME"

source_dirs:
  type: str
  help: "Space-separated source directories (for linting/scanning)"
  default: "src/"

license:
  type: str
  help: "License for YOUR project (Batten itself is AGPL-3.0)"
  default: "MIT"
  choices:
    - "MIT"
    - "Apache-2.0"
    - "AGPL-3.0"

# ─── Languages ────────────────────────────────────────────────────────────────

lang_python:
  type: bool
  help: "Python support (ruff, bandit, pytest, pip-audit)"
  default: false

python_version:
  type: str
  help: "Python version for CI"
  default: "3.12"
  when: "{{ lang_python }}"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

lang_typescript:
  type: bool
  help: "TypeScript support (eslint, vitest)"
  default: false

lang_go:
  type: bool
  help: "Go support (golangci-lint, go test)"
  default: false

lang_rust:
  type: bool
  help: "Rust support (clippy, cargo test)"
  default: false

lang_php:
  type: bool
  help: "PHP support (phpcs, phpunit, composer audit)"
  default: false

php_version:
  type: str
  help: "PHP version for CI"
  default: "8.3"
  when: "{{ lang_php }}"
  choices:
    - "8.1"
    - "8.2"
    - "8.3"
    - "8.4"

lang_elixir:
  type: bool
  help: "Elixir support (credo, mix test, sobelow)"
  default: false

elixir_version:
  type: str
  help: "Elixir version for CI"
  default: "1.17"
  when: "{{ lang_elixir }}"
  choices:
    - "1.16"
    - "1.17"
    - "1.18"

otp_version:
  type: str
  help: "Erlang/OTP version for CI"
  default: "27"
  when: "{{ lang_elixir }}"
  choices:
    - "26"
    - "27"

lang_java:
  type: bool
  help: "Java/Kotlin support (checkstyle, JUnit, SpotBugs, OWASP dep-check)"
  default: false

java_version:
  type: str
  help: "Java version for CI"
  default: "21"
  when: "{{ lang_java }}"
  choices:
    - "17"
    - "21"
    - "22"

lang_csharp:
  type: bool
  help: "C#/.NET support (dotnet format, dotnet test)"
  default: false

dotnet_version:
  type: str
  help: ".NET SDK version for CI"
  default: "8.0"
  when: "{{ lang_csharp }}"
  choices:
    - "6.0"
    - "7.0"
    - "8.0"
    - "9.0"

lang_ruby:
  type: bool
  help: "Ruby support (rubocop, rspec, bundler-audit)"
  default: false

ruby_version:
  type: str
  help: "Ruby version for CI"
  default: "3.3"
  when: "{{ lang_ruby }}"
  choices:
    - "3.1"
    - "3.2"
    - "3.3"
    - "3.4"

# ─── Methodology ──────────────────────────────────────────────────────────────
# Batten ships a default workflow (S/A/B/C tiers). If your org already has
# a methodology, set custom_methodology=true to strip Batten's workflow content
# and keep only the infrastructure (CI, hooks, CLI, tool wiring).

custom_methodology:
  type: bool
  help: "Use your own methodology? (strips Batten tiers/workflow from generated files)"
  default: false

skip_agent_instructions:
  type: bool
  help: "Skip generating agent instruction files? (your methodology provides its own)"
  default: false
  when: "{{ custom_methodology }}"

branching_model:
  type: str
  help: "Branch protection model"
  default: "simple"
  choices:
    - "simple"
    - "gitflow"
    - "trunk"

# ─── AI Agent Targets ─────────────────────────────────────────────────────────
# Batten generates agent instruction files for each selected target.
# Each agent reads only its own file -- safe to enable all.

agent_claude_code:
  type: bool
  help: "Generate CLAUDE.md (Claude Code / Claude CLI)"
  default: true

agent_cursor:
  type: bool
  help: "Generate .cursor/rules/batten.mdc (Cursor)"
  default: true

agent_github_copilot:
  type: bool
  help: "Generate .github/copilot-instructions.md (GitHub Copilot)"
  default: true

agent_codex:
  type: bool
  help: "Generate AGENTS.md (OpenAI Codex CLI)"
  default: false

# ─── Engineering Memory ───────────────────────────────────────────────────────
# MemPalace here serves the engineering process: it keeps context files current,
# powers agent orientation, and runs in CI to mine the repo on merge.
# Projects that want MemPalace as a runtime dependency can add it independently.

mempalace_enabled:
  type: bool
  help: "MemPalace for engineering context (agent orientation, CI context-sync)"
  default: false

# ─── Workflow Tools ───────────────────────────────────────────────────────────

gstack_enabled:
  type: bool
  help: "gstack integration (sprint workflow -- /office-hours, /review, /ship)"
  default: false

# ─── Runtime Enforcement ──────────────────────────────────────────────────────

runtime_enforcement:
  type: str
  help: "Runtime guardrails (block dangerous actions before execution)"
  default: "none"
  choices:
    - "none"
    - "caliper"
    - "agentsteer"

# ─── Merge Gates ──────────────────────────────────────────────────────────────

merge_gate:
  type: str
  help: "Additional merge-time validation beyond Batten's CI"
  default: "none"
  choices:
    - "none"
    - "agent-guardrails"
    - "roborev"

# ─── Security Rules ──────────────────────────────────────────────────────────

codeguard_enabled:
  type: bool
  help: "Project CodeGuard (CoSAI OWASP security rules for AI agents)"
  default: false

# ─── Dependency Updates ──────────────────────────────────────────────────────

dependency_updates:
  type: str
  help: "Dependency update automation"
  default: "dependabot"
  choices:
    - "dependabot"
    - "renovate"
    - "none"

# ─── CI Platform ─────────────────────────────────────────────────────────────

ci_platform:
  type: str
  help: "CI/CD platform for generated pipeline"
  default: "github"
  choices:
    - "github"
    - "gitlab"
    - "circleci"
