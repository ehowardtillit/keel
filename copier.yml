# ⚓ KEEL -- Copier Template Configuration
# KEEL Enforces Engineering Layouts
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: ""
_templates_suffix: .jinja

_tasks:
  - "chmod +x bootstrap.sh"
  - "chmod +x keel"

_exclude:
  - "copier.yml"
  - ".git"
  - ".github/workflows/keel-ci.yml"
  - ".github/ISSUE_TEMPLATE/bug.yml"
  - ".github/ISSUE_TEMPLATE/feature.yml"
  - ".github/ISSUE_TEMPLATE/config.yml"
  - "LICENSE-FAQ.md"
  - "install.sh"
  - "CHANGELOG.md"

# ─── Project Basics ───────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Project name (e.g., 'My API', 'Acme CRM')"
  default: "My Project"

github_owner:
  type: str
  help: "GitHub username or org (for CODEOWNERS)"
  default: "CHANGE-ME"

source_dirs:
  type: str
  help: "Space-separated source directories (for linting/scanning)"
  default: "src/"

license:
  type: str
  help: "License for YOUR project (KEEL itself is AGPL-3.0)"
  default: "MIT"
  choices:
    - "MIT"
    - "Apache-2.0"
    - "AGPL-3.0"

# ─── Languages ────────────────────────────────────────────────────────────────

lang_python:
  type: bool
  help: "Python support (ruff, bandit, pytest, pip-audit)"
  default: false

python_version:
  type: str
  help: "Python version for CI"
  default: "3.12"
  when: "{{ lang_python }}"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

lang_typescript:
  type: bool
  help: "TypeScript support (eslint, vitest)"
  default: false

lang_go:
  type: bool
  help: "Go support (golangci-lint, go test)"
  default: false

lang_rust:
  type: bool
  help: "Rust support (clippy, cargo test)"
  default: false

lang_php:
  type: bool
  help: "PHP support (phpcs, phpunit, composer audit)"
  default: false

php_version:
  type: str
  help: "PHP version for CI"
  default: "8.3"
  when: "{{ lang_php }}"
  choices:
    - "8.1"
    - "8.2"
    - "8.3"
    - "8.4"

lang_elixir:
  type: bool
  help: "Elixir support (credo, mix test, sobelow)"
  default: false

elixir_version:
  type: str
  help: "Elixir version for CI"
  default: "1.17"
  when: "{{ lang_elixir }}"
  choices:
    - "1.16"
    - "1.17"
    - "1.18"

otp_version:
  type: str
  help: "Erlang/OTP version for CI"
  default: "27"
  when: "{{ lang_elixir }}"
  choices:
    - "26"
    - "27"

lang_java:
  type: bool
  help: "Java/Kotlin support (checkstyle, JUnit, SpotBugs, OWASP dep-check)"
  default: false

java_version:
  type: str
  help: "Java version for CI"
  default: "21"
  when: "{{ lang_java }}"
  choices:
    - "17"
    - "21"
    - "22"

# ─── Methodology ──────────────────────────────────────────────────────────────
# KEEL ships a default workflow (S/A/B/C tiers). If your org already has
# a methodology, set custom_methodology=true to strip KEEL's workflow content
# and keep only the infrastructure (CI, hooks, CLI, tool wiring).

custom_methodology:
  type: bool
  help: "Use your own methodology? (strips KEEL tiers/workflow from generated files)"
  default: false

skip_agent_instructions:
  type: bool
  help: "Skip generating agent instruction files? (your methodology provides its own)"
  default: false
  when: "{{ custom_methodology }}"

branching_model:
  type: str
  help: "Branch protection model"
  default: "simple"
  choices:
    - "simple"
    - "gitflow"
    - "trunk"

# ─── AI Agent Targets ─────────────────────────────────────────────────────────
# KEEL generates agent instruction files for each selected target.
# Each agent reads only its own file -- safe to enable all.

agent_claude_code:
  type: bool
  help: "Generate CLAUDE.md (Claude Code / Claude CLI)"
  default: true

agent_cursor:
  type: bool
  help: "Generate .cursor/rules/keel.mdc (Cursor)"
  default: true

agent_github_copilot:
  type: bool
  help: "Generate .github/copilot-instructions.md (GitHub Copilot)"
  default: true

agent_codex:
  type: bool
  help: "Generate AGENTS.md (OpenAI Codex CLI)"
  default: false

# ─── Memory Layer ─────────────────────────────────────────────────────────────

mempalace_enabled:
  type: bool
  help: "MemPalace integration (local semantic memory + knowledge graph via MCP)"
  default: false

# ─── Workflow Tools ───────────────────────────────────────────────────────────

gstack_enabled:
  type: bool
  help: "gstack integration (sprint workflow -- /office-hours, /review, /ship)"
  default: false

# ─── Runtime Enforcement ──────────────────────────────────────────────────────

runtime_enforcement:
  type: str
  help: "Runtime guardrails (block dangerous actions before execution)"
  default: "none"
  choices:
    - "none"
    - "caliper"
    - "agentsteer"

# ─── Merge Gates ──────────────────────────────────────────────────────────────

merge_gate:
  type: str
  help: "Additional merge-time validation beyond KEEL's CI"
  default: "none"
  choices:
    - "none"
    - "agent-guardrails"
    - "roborev"

# ─── Security Rules ──────────────────────────────────────────────────────────

codeguard_enabled:
  type: bool
  help: "Project CodeGuard (CoSAI OWASP security rules for AI agents)"
  default: false

# ─── Dependency Updates ──────────────────────────────────────────────────────

dependency_updates:
  type: str
  help: "Dependency update automation"
  default: "dependabot"
  choices:
    - "dependabot"
    - "renovate"
    - "none"
